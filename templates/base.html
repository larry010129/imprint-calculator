<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}鑽石戒指／項鍊 價格試算{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<meta name="csrf-token" content="{{ csrf_token() }}">
{% block extra_head %}{% endblock %}
</head>
<body>

{% if current_user.is_authenticated %}
<nav class="premium-navbar">
  <div class="nav-container">
    <div class="nav-links">
      <a href="{{ url_for('home') }}" class="nav-item" data-i18n="nav_home">系統首頁</a>
      <a href="{{ url_for('calculator') }}" class="nav-item" data-i18n="nav_calc">計算機</a>
      <a href="{{ url_for('history') }}" class="nav-item" data-i18n="nav_history">歷史紀錄</a>
      {% if current_user.role == 'admin' %}
      <a href="{{ url_for('admin') }}" class="nav-item" data-i18n="nav_admin">管理後台</a>
      {% endif %}
    </div>
    <div class="nav-user">
      <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:18px; color:var(--color-text);">🌓</button>
      <button id="lang-toggle" style="background:none; border:none; cursor:pointer; font-size:14px; font-weight:bold; color:var(--color-text); margin-right: 10px;">EN</button>
      <span class="user-greeting"><span data-i18n="nav_login_as">目前登入：</span>{{ current_user.store_name }}</span>
      <a href="{{ url_for('logout') }}" class="nav-item logout-btn" data-i18n="nav_logout">登出</a>
    </div>
  </div>
</nav>
{% endif %}

<div class="page-container">
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
</div>

<script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
</body>
</html>
