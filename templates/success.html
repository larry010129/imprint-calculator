{% extends "base.html" %}
{% block title %}送出成功 - 鑽石戒指／項鍊{% endblock %}

{% block content %}
<div style="text-align: center; margin-top: 50px;">
  <div style="font-size: 64px; color: var(--color-brand); margin-bottom: 20px;">✓</div>
  <h2 data-i18n="success_title">訂單送出</h2>
  <p style="color: var(--color-text-muted); margin-bottom: 30px;" data-i18n="success_desc">您的訂單已經成功記錄。</p>
  
  <div style="display: flex; justify-content: center; gap: 15px;">
    <a href="{{ url_for('calculator') }}" data-i18n="success_btn_new" style="padding: 12px 24px; background: var(--color-surface-alt); border: 1px solid var(--color-border); border-radius: 4px; color: var(--color-text); text-decoration: none;">新增另一筆</a>
    <a href="{{ url_for('history') }}" data-i18n="success_btn_history" style="padding: 12px 24px; background: var(--color-brand); border: none; border-radius: 4px; color: var(--color-accent-ink); font-weight: bold; text-decoration: none;">查看歷史紀錄</a>
  </div>
</div>
{% endblock %}
