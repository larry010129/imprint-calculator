<!DOCTYPE html>
<html lang="zh-Hant">
<head>
{% include 'layout/partials/theme_head.html' %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}鑽石珠寶{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chiron-hei-hk-webfont@2.6.9/css/vf.css">
<link rel="stylesheet" href="{{ module_static('auth', 'css/auth.css') }}">
<meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body class="auth-body">

<div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="toast toast--{{ category }}" role="status">
      <span class="toast-message">{{ message }}</span>
      <button type="button" class="toast-close" aria-label="關閉通知">&times;</button>
    </div>
    {% endfor %}
  {% endwith %}
</div>

{% block body %}{% endblock %}

<script src="{{ url_for('static', filename='js/page-transitions.js') }}?v=1"></script>
<script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script src="{{ module_static('auth', 'js/auth.js') }}"></script>
</body>
</html>
